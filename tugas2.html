<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8"> <!-- Menentukan encoding karakter -->
<title>Manajemen Mahasiswa</title> <!-- Judul halaman di tab browser -->

<style>

/* ===================== ALL (1 - 70) ===================== */
/* Mengatur tampilan body (halaman utama) */
body {
    margin: 0; /* Menghilangkan margin default */
    font-family: Arial; /* Font utama */
    height: 100vh; /* Tinggi full layar */
    display: flex; /* Menggunakan flexbox */
    justify-content: center; /* Tengah horizontal */
    align-items: center; /* Tengah vertikal */

    /* Background gambar */
    background: url('https://koranusantara.com/wp-content/uploads/2026/01/f21704a5-ad49-488e-9e6a-2bebc62cba7a-1392x928-1.jpg') no-repeat center;
    background-size: cover; /* Supaya gambar penuh layar */
}

/* Layer gelap transparan di atas background */
body::before {
    content: "";
    position: absolute; /* Menutupi seluruh layar */
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4); /* Efek gelap */
    z-index: 0; /* Di belakang konten */
}

/* Card utama pembungkus konten */
.card {
    position: relative; /* Supaya di atas layer gelap */
    z-index: 1;
    background: rgba(255,255,255,0.40); /* Transparan */
    padding: 25px; /* Jarak dalam */
    border-radius: 15px; /* Sudut melengkung */
    width: 750px; /* Lebar card */
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* Bayangan */
}

/* Judul */
h2 {
    color: #ffffff; /* Warna putih */
}

/* ===================== CLARA (71 - 140) ===================== */
/* Mengatur baris input */
.form-group {
    display: flex; /* Input sejajar */
    gap: 10px; /* Jarak antar input */
    margin-bottom: 10px; /* Jarak bawah */
}

/* Styling input & select */
input, select {
    flex: 1; /* Lebar otomatis */
    padding: 10px; /* Isi dalam */
    border-radius: 8px; /* Sudut */
    border: 1px solid #ccc; /* Border abu */
}

/* Grup tombol */
.button-group {
    display: flex;
    gap: 10px;
}

/* Tombol umum */
button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer; /* Cursor tangan */
}

/* Tombol simpan */
.save-btn {
    background: #00c853;
    color: white;
}

/* Tombol reset */
.reset-btn {
    background: #e80000;
    color: white;
}

/* ===================== MELDA (141 - 210) ===================== */
/* Kotak search */
.search-box {
    margin: 15px 0;
}

/* Input search full */
.search-box input {
    width: 100%;
}

/* Tabel */
table {
    width: 100%;
    border-collapse: collapse; /* Hilangkan jarak border */
}

/* Header tabel */
th {
    background: #0077ff;
    color: white;
    padding: 10px;
}

/* Isi tabel */
td {
    padding: 10px;
    text-align: center;
}

/* Baris genap */
tr:nth-child(even) {
    background: #e3f2fd;
}

/* Baris ganjil */
tr:nth-child(odd) {
    background: #bbdefb;
}

/* Tombol hapus */
.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
}

/* ===================== HANI (211 - 290) ===================== */
/* Badge kelas */
.badge {
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    font-weight: bold;
}

/* Warna badge */
.pagi { background: #2196f3; }
.sore { background: #ff9800; }

</style>
</head>

<body>

<!-- Card utama -->
<div class="card">

<h2>🎓 Manajemen Mahasiswa</h2>

<!-- ===================== CLARA ===================== -->
<!-- Form input data -->
<form id="formMahasiswa">

    <!-- Input NIM & Nama -->
    <div class="form-group">
        <input type="text" id="nim" placeholder="NIM" required>
        <input type="text" id="nama" placeholder="Nama Lengkap" required>
    </div>

    <!-- Input Email & Jurusan -->
    <div class="form-group">
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="jurusan" placeholder="Jurusan" required>
    </div>

    <!-- Input Alamat & Kelas -->
    <div class="form-group">
        <input type="text" id="alamat" placeholder="Alamat">

        <select id="kelas">
            <option value="">Pilih Kelas</option>
            <option>Pagi</option>
            <option>Sore</option>
        </select>
    </div>

    <!-- Tombol aksi -->
    <div class="button-group">
        <button type="submit" class="save-btn">✔ Simpan Data</button>
        <button type="reset" class="reset-btn">🔄 Reset Form</button>
    </div>

</form>

<!-- ===================== MELDA ===================== -->
<!-- Input pencarian -->
<div class="search-box">
    <input type="text" id="search" placeholder="🔍 Cari data mahasiswa...">
</div>

<!-- ===================== HANI ===================== -->
<!-- Tabel data -->
<table>
<thead>
<tr>
<th>No</th>
<th>NIM</th>
<th>Nama</th>
<th>Email</th>
<th>Jurusan</th>
<th>Alamat</th>
<th>Kelas</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableBody"></tbody> <!-- Data akan dimasukkan via JS -->
</table>

</div>

<!-- ===================== ALL (JAVASCRIPT) ===================== -->
<script>

/* Ambil data dari localStorage atau array kosong */
let data = JSON.parse(localStorage.getItem("mahasiswa")) || [];

/* ===================== CLARA ===================== */
// Event saat form disubmit
formMahasiswa.addEventListener("submit", function(e){
    e.preventDefault(); // Mencegah reload

    // Ambil data dari input
    let mhs = {
        nim: nim.value,
        nama: nama.value,
        email: email.value,
        jurusan: jurusan.value,
        alamat: alamat.value,
        kelas: kelas.value
    };

    data.push(mhs); // Tambah ke array
    localStorage.setItem("mahasiswa", JSON.stringify(data)); // Simpan

    tampilkanData(); // Refresh tabel
    this.reset(); // Reset form
});

/* ===================== HANI ===================== */
// Menampilkan data ke tabel
function tampilkanData(filter=""){
    tableBody.innerHTML = ""; // Kosongkan tabel

    data
    .filter(d =>
        d.nama.toLowerCase().includes(filter) || // Filter nama
        d.nim.toLowerCase().includes(filter)     // Filter NIM
    )
    .forEach((d,i)=>{

        let kelasClass = d.kelas.toLowerCase(); // Ambil class badge

        // Tambah baris ke tabel
        tableBody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${d.nim}</td>
            <td>${d.nama}</td>
            <td>${d.email}</td>
            <td>${d.jurusan}</td>
            <td>${d.alamat}</td>
            <td><span class="badge ${kelasClass}">${d.kelas}</span></td>
            <td><button class="delete-btn" onclick="hapusData(${i})">Hapus</button></td>
        </tr>
        `;
    });
}

/* ===================== MELDA ===================== */
// Menghapus data
function hapusData(i){
    data.splice(i,1); // Hapus dari array
    localStorage.setItem("mahasiswa", JSON.stringify(data)); // Update storage
    tampilkanData(); // Refresh
}

/* ===================== ALL ===================== */
// Event pencarian
search.addEventListener("keyup", function(){
    tampilkanData(this.value.toLowerCase()); // Filter real-time
});

// Menampilkan data saat pertama load
tampilkanData();

</script>

</body>
</html>
